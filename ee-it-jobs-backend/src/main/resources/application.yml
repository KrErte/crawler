spring:
  application:
    name: ee-it-jobs

  datasource:
    url: jdbc:postgresql://localhost:5432/ee_it_jobs
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  forward-headers-strategy: native

app:
  jwt:
    secret: "your-256-bit-secret-key-change-in-production-must-be-at-least-32-chars"
    expiration-ms: 86400000       # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:4200,http://localhost:8080}

  scraper:
    rate-limit: 2.0
    max-concurrency: 4
    request-timeout-seconds: 30
    user-agent: "EE-IT-Jobs-Crawler/1.0"
    cron: "0 0 8 * * MON-FRI"

  storage:
    cv-dir: "./uploads/cv"

  base-url: ${APP_BASE_URL:http://localhost:4200}
  mail-from: ${MAIL_FROM:noreply@eeitjobs.ee}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    ee.itjobs: DEBUG
    org.springframework.security: INFO
