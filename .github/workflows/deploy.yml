name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/ci.yml'

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ee-it-jobs-frontend/package-lock.json

      - name: Build frontend
        working-directory: ee-it-jobs-frontend
        run: |
          npm ci
          npm run build -- --configuration production

      - name: Copy frontend to backend static
        run: |
          rm -rf ee-it-jobs-backend/src/main/resources/static
          cp -r ee-it-jobs-frontend/dist/ee-it-jobs-frontend/browser ee-it-jobs-backend/src/main/resources/static

      - name: Build backend JAR
        working-directory: ee-it-jobs-backend
        run: mvn clean package -DskipTests -B

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: "ee-it-jobs-backend/target/*.jar"
          target: "/opt/ee-it-jobs/"
          strip_components: 2

      - name: Restart application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            cp /opt/ee-it-jobs/*.jar /opt/ee-it-jobs/app.jar
            systemctl restart ee-it-jobs.service
            sleep 10
            curl -sf http://localhost:8080/api/scrape/status || echo "Health check pending..."
