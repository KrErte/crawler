name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ee_it_jobs_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        working-directory: ee-it-jobs-backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ee_it_jobs_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
        run: mvn verify -B

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ee-it-jobs-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ee-it-jobs-frontend
        run: npm ci

      - name: Build
        working-directory: ee-it-jobs-frontend
        run: npm run build -- --configuration production

      - name: Run tests
        working-directory: ee-it-jobs-frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless || true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t ee-it-jobs-backend ./ee-it-jobs-backend

      - name: Build frontend image
        run: docker build -t ee-it-jobs-frontend ./ee-it-jobs-frontend
